<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TODO</title>
</head>
<body>

<h1>TODOリスト</h1>

<form action="/add" method="post">
    タイトル: <input type="text" name="title"><br>
    説明: <input type="text" name="description"><br>
    重要度: <select name ="importance">
        <option value="">選択してください</option>
        <option value="high">高</option>
        <option value="middle">中</option>
        <option value="low">低</option>
    </select><br>
    締切: <input type="datetime-local" name="deadline"><br>
    <button type="submit">追加</button>
</form>

<hr>

<ul>
    <li th:each="todo : ${todos}">
        <span th:text="${todo.title}"></span>
        <a th:href="@{/edit/{id}(id=${todo.id})}">編集</a>
        <a th:href="@{/delete/{id}(id=${todo.id})}" onclick="return confirm('このTODOを削除しますか？');">削除</a>      
    </li>
</ul>

</body>
</html>
