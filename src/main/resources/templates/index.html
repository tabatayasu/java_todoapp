<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>TODO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- 右上に履歴ボタンを追加 -->
    <div class="header-container">
        <h1>TODOリスト</h1>
        <button id="historyBtn" class="button history">履歴</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-title">全体</div>
            <div class="stat-value" th:text="${totalCount}">7</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">未完了</div>
            <div class="stat-value" th:text="${incompleteCount}">7</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">期限超過</div>
            <div class="stat-value" th:text="${overdueCount}">2</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">3日以内</div>
            <div class="stat-value" th:text="${dueSoonCount}">2</div>
        </div>
    </div>

    <!-- フォームのレイアウト改善 -->
    <form action="/add" method="post" class="add-form">
        <div class="form-group">
            <label for="title">タイトル:</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="description">説明:</label>
            <input type="text" id="description" name="description">
        </div>
        <div class="form-group">
            <label for="importance">重要度:</label>
            <select id="importance" name="importance">
                <option value="">選択してください</option>
                <option value="HIGH">高</option>
                <option value="MIDDLE">中</option>
                <option value="LOW">低</option>
            </select>
        </div>
        <div class="form-group">
            <label for="deadline">締切:</label>
            <input type="datetime-local" id="deadline" name="deadline">
        </div>
        <button type="submit" class="button primary">追加</button>
    </form>

    <hr>

    <div class="table-container">
        <table class="todo-table">
            <thead>
                <tr>
                    <th>完了</th>
                    <th>タイトル</th>
                    <th>説明</th>
                    <th>重要度</th>
                    <th>締切</th>
                    <th>アクション</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="todo : ${todos}" class="todo-row" th:attr="data-id=${todo.id}">
                    <td class="checkbox-cell">
                        <label class="todo-checkbox">
                            <input type="checkbox" th:checked="${todo.completeAt != null}"
                                th:attr="onclick=|window.location.href='@{/toggle/{id}(id=${todo.id})}'|">
                        </label>
                    </td>
                    <td th:text="${todo.title}" class="title-cell"></td>
                    <td th:text="${todo.description != null ? todo.description : ''}"></td>
                    <td>
                        <span th:if="${todo.importance != null}" th:class="'badge ' + ${todo.importance.code}"
                            th:text="${todo.importance.label}"></span>
                    </td>
                    <td th:class="${todo.deadline != null and todo.deadline.isBefore(T(java.time.LocalDateTime).now()) ? 'overdue' : (todo.deadline != null and todo.deadline.isBefore(T(java.time.LocalDateTime).now().plusDays(3)) ? 'due-soon' : '')}"
                        th:text="${todo.deadline != null ? #temporals.format(todo.deadline, 'yyyy-MM-dd HH:mm') : '期限未設定'}">
                    </td>
                    <td class="actions">
                        <button type="button" class="button edit" th:onclick="|openEditDialog(${todo.id})|">
                            編集
                        </button>
                        <a th:href="@{/delete/{id}(id=${todo.id})}" class="button delete"
                            onclick="return confirm('このTODOを削除しますか？');">削除</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- モーダル -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>TODO履歴</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div id="historyList" class="history-list">
                    <!-- ここに履歴が動的に表示される -->
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>TODO 編集</h2>
                <span class="close edit-close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editForm" method="post">
                    <div class="form-group">
                        <label for="editTitle">タイトル</label>
                        <input type="text" id="editTitle" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="editDescription">説明</label>
                        <input type="text" id="editDescription" name="description">
                    </div>
                    <div class="form-group">
                        <label for="editImportance">重要度</label>
                        <select id="editImportance" name="importance">
                            <option value="">選択してください</option>
                            <option value="HIGH">高</option>
                            <option value="MIDDLE">中</option>
                            <option value="LOW">低</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editDeadline">締切</label>
                        <input type="datetime-local" id="editDeadline" name="deadline">
                    </div>
                    <button type="submit" class="button primary">更新</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // モーダル要素の取得
        const modal = document.getElementById('historyModal');
        const historyBtn = document.getElementById('historyBtn');
        const closeBtn = document.querySelector('.close');

        // 履歴ボタンクリック時
        historyBtn.addEventListener('click', function () {
            loadHistory();
            modal.style.display = 'block';
        });

        // 閉じるボタンクリック時
        closeBtn.addEventListener('click', function () {
            modal.style.display = 'none';
        });

        // モーダル外クリック時
        window.addEventListener('click', function (event) {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

        // 履歴を取得して表示
        function loadHistory() {
            fetch('/api/history')
                .then(response => response.json())
                .then(data => {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = '';

                    if (data.length === 0) {
                        historyList.innerHTML = '<p>完了したTODOはありません。</p>';
                        return;
                    }

                    data.forEach(todo => {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-content">
                                <div class="history-title">${escapeHtml(todo.title)}</div>
                                <div class="history-desc">${escapeHtml(todo.description || '')}</div>
                                <div class="history-meta">
                                    <span class="badge ${todo.importance ? todo.importance.code : ''}">
                                        ${todo.importance ? todo.importance.label : ''}
                                    </span>
                                    <span class="deadline">${todo.deadline ? formatDate(todo.deadline) : '期限未設定'}</span>
                                </div>
                            </div>
                            <button class="button restore-btn" onclick="loadFromHistory('${escapeHtml(todo.title)}', '${escapeHtml(todo.description || '')}', '${todo.importance ? todo.importance : ''}', '${formatDateForInput(todo.deadline)}')">呼び出す</button>
                        `;
                        historyList.appendChild(item);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // 履歴からフォームにデータをロード
        function loadFromHistory(title, description, importance, deadline) {
            document.getElementById('title').value = title;
            document.getElementById('description').value = description;
            document.getElementById('importance').value = importance;
            document.getElementById('deadline').value = deadline;
            modal.style.display = 'none';
        }

        // HTML特殊文字をエスケープ
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 日時をフォーマット
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('ja-JP', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 日時をフォーマットして入力用に変換
        function formatDateForInput(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        // 編集モーダルの開閉
        const editModal = document.getElementById('editModal');
        const editCloseBtn = document.querySelector('.edit-close');
        const editForm = document.getElementById('editForm');

        function openEditDialog(id) {
            fetch(`/api/todo/${id}`)
                .then(res => res.json())
                .then(todo => {
                    editForm.action = `/update/${id}`;
                    document.getElementById('editTitle').value = todo.title || '';
                    document.getElementById('editDescription').value = todo.description || '';
                    document.getElementById('editImportance').value = todo.importance || '';
                    document.getElementById('editDeadline').value = formatDateForInput(todo.deadline);
                    editModal.style.display = 'block';
                });
        }

        editCloseBtn.addEventListener('click', () => {
            editModal.style.display = 'none';
        });

        window.addEventListener('click', function (event) {
            if (event.target === editModal) {
                editModal.style.display = 'none';
            }
        });
    </script>

</body>

</html>
